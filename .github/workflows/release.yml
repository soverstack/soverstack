name: Build & Release Launcher

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(jq -r .version version.json)
            echo "version=${VERSION}-SNAPSHOT" >> "$GITHUB_OUTPUT"
            echo "tag=v${VERSION}-SNAPSHOT" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Cross-compile
        run: |
          VERSION=${{ steps.version.outputs.version }}
          LDFLAGS="-s -w -X main.Version=${VERSION}"
          mkdir -p dist

          GOOS=windows GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/soverstack-windows-amd64.exe .
          GOOS=linux   GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/soverstack-linux-amd64 .
          GOOS=linux   GOARCH=arm64 go build -ldflags="$LDFLAGS" -o dist/soverstack-linux-arm64 .
          GOOS=darwin  GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/soverstack-darwin-amd64 .
          GOOS=darwin  GOARCH=arm64 go build -ldflags="$LDFLAGS" -o dist/soverstack-darwin-arm64 .

          ls -lh dist/

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Soverstack Launcher ${{ steps.version.outputs.version }}
          prerelease: ${{ steps.version.outputs.is_release != 'true' }}
          generate_release_notes: true
          files: dist/*
