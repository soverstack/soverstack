name: Finish Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finish:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/heads/release/')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Read version
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          IFS='.' read -r major minor patch <<< "$VERSION"
          NEXT="$major.$((minor + 1)).0-dev"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"

      # Step 1: Merge release into main and create tag
      - name: Merge into main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="${GITHUB_REF#refs/heads/}"
          VERSION="${{ steps.version.outputs.version }}"

          git fetch origin main
          git checkout main
          git merge "$BRANCH" --no-ff -m "release: v$VERSION"
          git tag "v$VERSION"
          git push origin main
          git push origin "v$VERSION"

      # Step 2: Build and publish release (HEAD is on main, tag matches)
      - name: Build and release
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}

      # Step 3: Merge back into develop and bump version
      - name: Bump develop
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          VERSION="${{ steps.version.outputs.version }}"
          NEXT="${{ steps.version.outputs.next }}"
          BRANCH="${GITHUB_REF#refs/heads/}"

          git fetch origin develop
          git checkout develop
          git merge main --no-ff -m "merge: v$VERSION back into develop"
          echo "$NEXT" > VERSION
          git add VERSION
          git commit -m "bump version to $NEXT"
          git push origin develop

          git push origin --delete "$BRANCH"

      - name: Summary
        run: |
          echo "### Release v${{ steps.version.outputs.version }} finished" >> "$GITHUB_STEP_SUMMARY"
          echo "- Release published with binaries" >> "$GITHUB_STEP_SUMMARY"
          echo "- Merged into \`main\` and back into \`develop\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`develop\` bumped to \`${{ steps.version.outputs.next }}\`" >> "$GITHUB_STEP_SUMMARY"
