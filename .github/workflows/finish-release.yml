name: Finish Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finish:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/heads/release/')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Finishing release: $VERSION"

      - name: Merge into main and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="${GITHUB_REF#refs/heads/}"
          VERSION="${{ steps.version.outputs.version }}"

          # Merge release branch into main
          git fetch origin main
          git checkout main
          git merge "$BRANCH" --no-ff -m "release: v$VERSION"

          # Create tag
          git tag "v$VERSION"

          # Push main + tag (tag triggers stable release in ci.yml)
          git push origin main
          git push origin "v$VERSION"

          # Merge main back into develop
          git fetch origin develop
          git checkout develop
          git merge main --no-ff -m "merge: v$VERSION back into develop"
          git push origin develop

          # Delete release branch
          git push origin --delete "$BRANCH"

          echo "### Release v$VERSION finished" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag \`v$VERSION\` created → release will be built automatically" >> "$GITHUB_STEP_SUMMARY"
          echo "- Merged into \`main\` and back into \`develop\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch \`$BRANCH\` deleted" >> "$GITHUB_STEP_SUMMARY"
