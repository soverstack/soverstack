version: 2

project_name: soverstack

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - main: .
    binary: soverstack
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.Version={{.Version}}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: soverstack
    name: cli-launcher
  header: |
    ## Install

    **macOS / Linux:**
    ```
    brew install soverstack/tap/soverstack
    ```

    **Windows:**
    ```
    scoop bucket add soverstack https://github.com/soverstack/scoop-bucket
    scoop install soverstack
    ```

    **Requirements:** [Docker](https://www.docker.com/products/docker-desktop/)

brews:
  - repository:
      owner: soverstack
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/soverstack/cli-launcher"
    description: "Sovereign infrastructure orchestration CLI"
    license: "AGPL-3.0-only"

scoops:
  - repository:
      owner: soverstack
      name: scoop-bucket
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/soverstack/cli-launcher"
    description: "Sovereign infrastructure orchestration CLI"
    license: "AGPL-3.0-only"
